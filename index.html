<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>父亲节快乐</title>
    <meta
      name="description"
      content="一份温暖的父亲节线上祝福，献给一直默默守护我们的爸爸。"
    />
    <meta property="og:title" content="父亲节快乐" />
    <meta property="og:description" content="把这份父亲节祝福送给爸爸。" />
    <meta property="og:image" content="assets/father-day-hero.png" />
    <style>
      :root {
        color-scheme: light;
        --ink: #172026;
        --muted: #65727c;
        --paper: #fffaf2;
        --line: rgba(23, 32, 38, 0.14);
        --gold: #d58932;
        --green: #5d8d77;
        --blue: #526c86;
        --white: rgba(255, 255, 255, 0.88);
        --shadow: 0 24px 70px rgba(36, 28, 16, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--paper);
        color: var(--ink);
        font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
        line-height: 1.6;
      }

      button,
      input {
        font: inherit;
      }

      .hero {
        position: relative;
        display: grid;
        min-height: 92vh;
        align-items: center;
        overflow: hidden;
        padding: 28px;
        isolation: isolate;
      }

      .hero::before {
        position: absolute;
        inset: 0;
        z-index: -2;
        background: url("assets/father-day-hero.png") center / cover no-repeat;
        content: "";
      }

      .hero::after {
        position: absolute;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(90deg, rgba(255, 250, 242, 0.96) 0%, rgba(255, 250, 242, 0.77) 41%, rgba(255, 250, 242, 0.24) 72%),
          linear-gradient(180deg, rgba(255, 250, 242, 0.1), rgba(255, 250, 242, 0.72));
        content: "";
      }

      .hero-inner {
        width: min(1120px, 100%);
        margin: 0 auto;
      }

      .hero-copy {
        width: min(620px, 100%);
      }

      .hero-note {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 28px;
        border-left: 3px solid var(--gold);
        background: rgba(255, 255, 255, 0.54);
        color: #40505a;
        padding: 10px 14px;
        backdrop-filter: blur(10px);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 22px;
        color: var(--blue);
        font-size: 0.95rem;
        font-weight: 700;
      }

      .eyebrow::before {
        width: 38px;
        height: 2px;
        background: var(--gold);
        content: "";
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 8vw, 6.8rem);
        line-height: 0.98;
        letter-spacing: 0;
      }

      .lead {
        width: min(560px, 100%);
        margin: 26px 0 0;
        color: #33414a;
        font-size: clamp(1.05rem, 2.6vw, 1.35rem);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 34px;
      }

      .button {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 12px 18px;
        cursor: pointer;
        text-decoration: none;
        transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
      }

      .button.primary {
        background: var(--ink);
        box-shadow: 0 14px 34px rgba(23, 32, 38, 0.2);
        color: white;
      }

      .button.secondary {
        border-color: var(--line);
        background: rgba(255, 255, 255, 0.62);
        color: var(--ink);
        backdrop-filter: blur(10px);
      }

      .button:hover {
        transform: translateY(-2px);
      }

      main {
        background: linear-gradient(180deg, #fffaf2 0%, #f4f7f1 100%);
      }

      .section {
        width: min(1120px, calc(100% - 40px));
        margin: 0 auto;
        padding: 72px 0;
      }

      .message-panel {
        display: grid;
        grid-template-columns: 1fr 0.78fr;
        gap: 34px;
        align-items: stretch;
      }

      .letter,
      .memory-board {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--white);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .letter {
        padding: clamp(28px, 5vw, 52px);
      }

      .letter h2,
      .memory-board h2 {
        margin: 0 0 18px;
        font-size: clamp(1.75rem, 4vw, 2.65rem);
        line-height: 1.18;
        letter-spacing: 0;
      }

      .letter p {
        margin: 0 0 18px;
        color: #34424a;
        font-size: 1.08rem;
      }

      .signature {
        margin-top: 30px;
        color: var(--gold);
        font-size: 1.2rem;
        font-weight: 800;
      }

      .memory-board {
        display: flex;
        flex-direction: column;
        padding: 26px;
      }

      .memory-list {
        display: grid;
        gap: 14px;
        margin: 8px 0 24px;
      }

      .memory {
        display: grid;
        grid-template-columns: 44px 1fr;
        gap: 14px;
        align-items: start;
        border-bottom: 1px solid rgba(23, 32, 38, 0.1);
        padding-bottom: 14px;
      }

      .memory:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }

      .icon {
        display: grid;
        width: 44px;
        height: 44px;
        place-items: center;
        border-radius: 8px;
        background: #eef4ed;
        color: var(--green);
        font-weight: 800;
      }

      .memory strong {
        display: block;
        margin-bottom: 2px;
      }

      .memory span {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .custom-note {
        margin-top: auto;
        border-top: 1px solid rgba(23, 32, 38, 0.1);
        padding-top: 22px;
      }

      .custom-note label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .custom-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      input {
        width: 100%;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.84);
        padding: 12px 14px;
        color: var(--ink);
        outline: none;
      }

      input:focus {
        border-color: rgba(213, 137, 50, 0.8);
        box-shadow: 0 0 0 4px rgba(213, 137, 50, 0.14);
      }

      .mini-button {
        border: 0;
        border-radius: 8px;
        background: var(--gold);
        color: white;
        cursor: pointer;
        padding: 0 16px;
        font-weight: 700;
      }

      .wish-strip {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
        padding-top: 0;
      }

      .wish {
        min-height: 158px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
        padding: 24px;
      }

      .wish b {
        display: block;
        margin-bottom: 10px;
        color: var(--blue);
        font-size: 1.05rem;
      }

      .wish p {
        margin: 0;
        color: #40505a;
      }

      .floating-toast {
        position: fixed;
        right: 22px;
        bottom: 22px;
        z-index: 20;
        max-width: min(360px, calc(100% - 44px));
        border: 1px solid rgba(23, 32, 38, 0.1);
        border-radius: 8px;
        background: rgba(23, 32, 38, 0.92);
        box-shadow: 0 18px 44px rgba(23, 32, 38, 0.22);
        color: white;
        opacity: 0;
        padding: 14px 16px;
        pointer-events: none;
        transform: translateY(10px);
        transition: opacity 200ms ease, transform 200ms ease;
      }

      .floating-toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      footer {
        border-top: 1px solid rgba(23, 32, 38, 0.1);
        padding: 26px 20px;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 820px) {
        .hero {
          min-height: 88vh;
          padding: 22px;
        }

        .hero::before {
          background-position: 62% center;
        }

        .hero::after {
          background:
            linear-gradient(180deg, rgba(255, 250, 242, 0.96) 0%, rgba(255, 250, 242, 0.78) 50%, rgba(255, 250, 242, 0.58) 100%);
        }

        .message-panel,
        .wish-strip {
          grid-template-columns: 1fr;
        }

        .custom-row {
          grid-template-columns: 1fr;
        }

        .mini-button {
          min-height: 46px;
        }
      }
    </style>
  </head>
  <body>
    <section class="hero" aria-label="父亲节祝福">
      <div class="hero-inner">
        <div class="hero-copy">
          <div class="eyebrow">2026 父亲节快乐</div>
          <h1>爸爸，辛苦了。</h1>
          <p class="lead">
            你总把爱藏在行动里，把担心说成提醒，把陪伴变成日常。今天，想把这份感谢认真地说给你听。
          </p>
          <div class="actions" aria-label="页面操作">
            <a class="button primary" href="blessing.html">打开祝福</a>
            <button class="button secondary" type="button" id="shareButton">分享这份心意</button>
          </div>
          <div class="hero-note">下一页是一封单独写给爸爸的祝福信。</div>
        </div>
      </div>
    </section>

    <footer>父亲节快乐，愿今天的祝福抵达你心里。</footer>
    <div class="floating-toast" id="toast" role="status" aria-live="polite"></div>

    <script>
      const shareButton = document.querySelector("#shareButton");
      const toast = document.querySelector("#toast");

      const showToast = (message) => {
        toast.textContent = message;
        toast.classList.add("show");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2400);
      };

      shareButton.addEventListener("click", async () => {
        const shareData = {
          title: "父亲节快乐",
          text: "把这份父亲节祝福送给爸爸。",
          url: window.location.href,
        };

        if (navigator.share) {
          await navigator.share(shareData);
          return;
        }

        await navigator.clipboard.writeText(window.location.href);
        showToast("链接已复制，可以发给爸爸了");
      });
    </script>
  </body>
</html>
